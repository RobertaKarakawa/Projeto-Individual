<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Nintendo Switch | Cadastro</title>

    <link rel="stylesheet" href="../CSS/style.css" />
    <link rel="icon" href="../IMGS/icon.png" />
</head>

<body>
    <!--header inicio-->
    <div class="header">
        <div class="container">
            <h1 class="titulo">Nintendo Switch</h1>
            <ul class="navbar">
                <li>
                    <a href="home.html">Home</a>
                </li>
                <li>
                    <a href="login.html">Login</a>
                </li>
                <li class="agora">
                    <a href="#">Cadastro</a>
                </li>
            </ul>
        </div>
    </div>
    <!--header fim-->

    <div class="console">
        <div class="container">

            <h2 class="titulo-form">Bem-vindo!</h2>

            <div class="corpo">

                <div class="lado esquerdo">
                </div>

                <div class="centro">
                    <div class="formulario">
                    

                        <div class="campo">
                            <span>Nome de Usuário:</span>
                            <input id="nome_input" type="text" placeholder="Seja criativo!" />
                        </div>
                        <div class="campo">
                            <span>E-mail:</span>
                            <input id="email_input" type="text" placeholder="Endereço de e-mail" />
                        </div>
                        <div class="campo">
                            <span>Senha:</span>
                            <input id="senha_input" type="password" placeholder="******" />
                        </div>
                        <div class="campo">
                            <span>Confirmação da Senha:</span>
                            <input id="confirmacao_senha_input" type="password" placeholder="******" />
                        </div>
                        <button class="botao" onclick="cadastrar()">Cadastrar</button>
                    </div>
                </div>
                

                <div class="lado direito"></div>
            </div>
        </div>
    </div>

    <!--footer inicio-->
    <div class="footer">
        <div class="container">
            <h4>Que bom que se interessou! &hearts;</h4>
        </div>
    </div>
    <!--footer fim-->
</body>

</html>
